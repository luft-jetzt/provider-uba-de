name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - run: composer install --no-progress --no-interaction

      - run: vendor/bin/phpstan analyse

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - run: composer install --no-progress --no-interaction

      - run: vendor/bin/phpunit
